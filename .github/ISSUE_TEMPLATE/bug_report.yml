name: 버그 제보
description: 뭔가 이상하게 동작하나요? 알려주세요.
labels: ["bug"]
body:
  - type: dropdown
    id: page
    attributes:
      label: 어느 페이지에서 발생했나요?
      options:
        - 홈
        - 런너 능력치
        - 변경권 확률
        - 경험치 계산기
        - 맵 도감
        - 코스튬
        - 가이드
        - 스토리 (목록)
        - 스토리 (웹툰 뷰어)
        - 공지사항
        - 검색
        - 기타
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: 어떤 문제인가요?
      description: 어떤 상황에서 뭐가 잘못되었는지 알려주세요.
      placeholder: "예: 스토리 뷰어에서 다음화 버튼을 눌렀는데 같은 화가 다시 나와요."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 원래 어떻게 되어야 하나요?
      placeholder: "예: 다음 에피소드로 넘어가야 해요."
    validations:
      required: false
  - type: dropdown
    id: device
    attributes:
      label: 사용 환경
      options:
        - PC (Chrome)
        - PC (Firefox)
        - PC (Safari)
        - PC (기타)
        - 모바일 (iOS Safari)
        - 모바일 (iOS Chrome)
        - 모바일 (Android Chrome)
        - 모바일 (기타)
    validations:
      required: true
  - type: textarea
    id: screenshot
    attributes:
      label: 스크린샷
      description: 가능하면 스크린샷을 첨부해주세요. 문제를 이해하는 데 큰 도움이 됩니다.
    validations:
      required: false
