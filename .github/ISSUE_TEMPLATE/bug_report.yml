name: 버그 제보
description: 사이트에서 발견한 문제를 알려주세요
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: 어떤 문제인가요?
      description: 버그를 최대한 자세히 설명해주세요.
      placeholder: "예: 캐릭터 비교 페이지에서 정렬 버튼을 누르면 순서가 반대로 나와요."
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 재현 방법
      description: 버그를 재현하는 단계를 알려주세요.
      placeholder: |
        1. /characters 페이지 접속
        2. '속도' 열 클릭
        3. ...
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: 기대한 동작
      description: 원래 어떻게 동작해야 한다고 생각하시나요?
    validations:
      required: false
  - type: dropdown
    id: device
    attributes:
      label: 환경
      options:
        - PC (Chrome)
        - PC (Firefox)
        - PC (Safari)
        - PC (기타)
        - 모바일 (iOS)
        - 모바일 (Android)
    validations:
      required: false
  - type: textarea
    id: screenshot
    attributes:
      label: 스크린샷
      description: 관련 스크린샷이 있다면 첨부해주세요.
    validations:
      required: false
