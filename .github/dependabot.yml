version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      prod:
        dependency-type: production
        update-types: [minor, patch]
      dev:
        dependency-type: development
        update-types: [minor, patch]
    labels: [dependencies]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      actions:
        patterns: ["*"]
    labels: [dependencies, ci]
