name: API health check

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install tsx
        run: npm install -g tsx

      - name: Check API endpoints
        id: check
        run: tsx scripts/api-health.ts

      - name: Create issue on failure
        if: failure() && steps.check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const failures = process.env.HEALTH_FAILURES || 'Unknown failures (check workflow logs)';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `API Health Check Failed — ${new Date().toISOString().slice(0, 10)}`,
              body: [
                '## API Health Check Failure',
                '',
                'The daily API health check detected issues with the Tales Runner API.',
                '',
                '### Failed endpoints',
                failures,
                '',
                `### Workflow run`,
                `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ].join('\n'),
              labels: ['bug', 'api'],
            });
