name: Update game data

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install tsx
        run: npm install -g tsx

      - name: Fetch latest data
        run: tsx scripts/fetch-data.ts

      - name: Validate data
        run: |
          for f in src/data/characters.json src/data/maps.json src/data/costumes.json src/data/guides.json src/data/stories.json src/data/probability-meta.json; do
            if [ ! -s "$f" ]; then
              echo "ERROR: $f is empty or missing"
              exit 1
            fi
            entries=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$f','utf8')).length || 0)")
            if [ "$entries" -lt 5 ]; then
              echo "ERROR: $f has only $entries entries (expected >= 5)"
              exit 1
            fi
            echo "OK: $f has $entries entries"
          done

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet src/data/ public/data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/ public/data/
          git commit -m "chore: update game data (automated)"
          git push
